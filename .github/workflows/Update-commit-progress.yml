name: 🔗 更新提交进度

on:
  schedule:
    - cron: '20 15 * * 0'  # 每周日 UTC 时间 15:20 运行
  workflow_dispatch:       # 手动触发

jobs:
  update_progress:
    runs-on: ubuntu-latest
    steps:
    
      - name: 检出仓库
        uses: actions/checkout@v7
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0

      - name: 更新提交进度
        run: |
          bash .github/scripts/update_progress.sh
